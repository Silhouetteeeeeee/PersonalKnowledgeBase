version: "3.9"

services:
  agent:
    image: knowledge-agent:latest
    environment:
      - TZ=Asia/Shanghai
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knowledge-agent
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persistent data: wiki pages, database, profiles, reasoning logs
      - ./data:/app/data
      # Model cache: avoid re-downloading fastembed models
      - ./cache:/root/.cache
    # No ports needed — uses WebSocket outbound connection
    # If you need health checks or monitoring:
    # healthcheck:
    #   test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/knowledge.db').execute('SELECT 1')"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
